{% extends 'admin/admin_head.html' %}
{% block content %}
{% load static %}

<style>
  .btn-submit {
    background: #007bff;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    transition: 0.3s;
  }
  .btn-submit:hover {
    background: #0056b3;
  }
</style>

<main class="main">
    <section id="contact" style="margin-left:20px" class="contact section">
        <div class="container section-title" data-aos="fade-up">
            <h2>Add syllabus</h2>
            <p>Provide proper materials for topics</p>
        </div>

        <div class="container" data-aos="fade-up" data-aos-delay="100">
            <div class="col-lg-7" style="width:100%;">
              <form action="{% url 'add_syllabus' %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="title" class="form-label">Syllabus Title</label>
                    <input type="text" class="form-control" name="title" id="title" required placeholder="Enter Syllabus title">
                </div>

                <div class="mb-3">
                    <label for="qualification" class="form-label">Provide a (.pdf) material</label>
                    <input type="file" class="form-control" accept=".pdf" name="file" id="qualification" required>
                </div>
                <div class="mb-3">
                    <label for="qualification" class="form-label">
                        <strong>Accepted Format:</strong> PDF only.  
                        If your document is in <code>.docx</code> format, please  
                        <a href="https://www.ilovepdf.com/word_to_pdf" target="_blank" style="color: #007bff; text-decoration: underline;">
                            convert it here
                        </a> before uploading.
                    </label>
                    
                </div>

                <div class="text-center">
                    <button type="submit" class="btn-submit">Add syllabus</button>
                </div>

            </form>
            </div>
        </div>
    </section>
</main>

<script>
document.addEventListener("DOMContentLoaded", function () {
    let dateInput = document.getElementById("date");

    let today = new Date();
    today.setDate(today.getDate() + 3); // Move to 3 days later

    let minDate = today.toISOString().slice(0, 10); // Format YYYY-MM-DD
    let maxTime = "T21:00"; // Latest selectable time
    let minTime = "T07:00"; // Earliest selectable time

    // Set min selectable date
    dateInput.setAttribute("min", minDate + minTime);
    dateInput.setAttribute("max", "9999-12-31" + maxTime); // Allow long-term scheduling

    // Restrict time selection within 07:00 - 17:00 dynamically
    dateInput.addEventListener("input", function () {
        let selectedDateTime = new Date(dateInput.value);
        let selectedHours = selectedDateTime.getHours();

        if (selectedHours < 7) {
            dateInput.value = dateInput.value.split("T")[0] + "T07:00";
        } else if (selectedHours >= 17) {
            dateInput.value = dateInput.value.split("T")[0] + "T17:00";
        }
    });
});
</script>

{% endblock %}
