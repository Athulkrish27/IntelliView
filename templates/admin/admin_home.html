
{% extends 'admin/admin_head.html' %}
{% block content %}
{% load static %}


  <main class="main">

    <!-- Hero Section -->
    <section id="hero" class="hero section dark-background">

      <img src="{% static 'college\img\college.jpg' %}" alt="" data-aos="fade-in" class="">

      <div id="name_portion" class="container" data-aos="fade-up" data-aos-delay="100">
        <h2>Example University</h2>
        <p>Excellence Through Education<span class="typed-cursor typed-cursor--blink" aria-hidden="true"></span><span class="typed-cursor typed-cursor--blink" aria-hidden="true"></span></p>
      </div>

    </section><!-- /Hero Section -->


    <!-- Stats Section -->
    <section id="stats" class="stats section">

      <div class="container" data-aos="fade-up" data-aos-delay="100">

        <div class="row gy-4">

          <div class="col-lg-3 col-md-6">
            <div class="stats-item">
              <i class="bi bi-headset"></i>
              <span data-purecounter-start="0" data-purecounter-end="{{interview_count}}" data-purecounter-duration="1" class="purecounter"></span>
              <p><strong>Scheduled Interviews</strong></p>
            </div>
          </div><!-- End Stats Item -->

          <div class="col-lg-3 col-md-6">
            <div class="stats-item">
              <i class="bi bi-journal-richtext"></i>
              <span data-purecounter-start="0" data-purecounter-end="{{syllabus_count}}" data-purecounter-duration="1" class="purecounter"></span>
              <p><strong>Syllabuses</strong> <span>added totally</span></p>
            </div>
          </div><!-- End Stats Item -->

          <div class="col-lg-3 col-md-6">
            <div class="stats-item">
              <i class="bi bi-question-circle"></i>
              <span data-purecounter-start="0" data-purecounter-end="{{qa_count}}" data-purecounter-duration="1" class="purecounter"></span>
              <p><strong>Question-Answers</strong> <span>generated totally</span></p>
            </div>
          </div><!-- End Stats Item -->

          <div class="col-lg-3 col-md-6">
            <div class="stats-item">
              <i class="bi bi-people"></i>
              <span data-purecounter-start="0" data-purecounter-end="{{application_count}}" data-purecounter-duration="1" class="purecounter"></span>
              <p><strong>Applications</strong> <span>received totally</span></p>
            </div>
          </div><!-- End Stats Item -->

        </div>

      </div>

    </section><!-- /Stats Section -->




    
  </main>



{% endblock %}
