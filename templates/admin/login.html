<!DOCTYPE html>
<html lang="en">
<head>
    {% if message %}
    <script>alert("{{message}}")</script>
    {% endif %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Admin Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container h2 {
            color: #0056b3;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .form-control {
            background: #ffffff;
            border: 1px solid #ccc;
            color: #333;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
        }
        .form-control::placeholder {
            color: #888;
        }
        .form-control:focus {
            border-color: #0056b3;
            box-shadow: 0 0 5px rgba(0, 86, 179, 0.3);
        }
        .btn-login {
            background: #0056b3;
            color: #fff;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #00408a;
        }
        .forgot-password {
            margin-top: 10px;
            font-size: 14px;
        }
        .forgot-password a {
            color: #0056b3;
            text-decoration: none;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .university-logo {
            width: 80px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/University_icon.svg/1024px-University_icon.svg.png" class="university-logo" alt="University Logo"> -->
        <h2>#Intelliview </br>Admin Login</h2>
        <form action="{% url 'admin_login' %}" method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-login">Login</button>
            <!-- <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div> -->
        </form>
    </div>

</body>
</html>
