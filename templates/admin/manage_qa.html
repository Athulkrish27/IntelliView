{% extends 'admin/admin_head.html' %}
{% block content %}
{% load static %}

<style>
  .btn-submit {
    background: #007bff;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    transition: 0.3s;
  }
  .btn-submit:hover {
    background: #0056b3;
  }
</style>

<main class="main">
    <section id="contact" style="margin-left:20px" class="contact section">
        <div class="container section-title" data-aos="fade-up">
            <h2>Edit Question or Answer</h2>
            <p>Your supervision is always better</p>
        </div>

        <div class="container" data-aos="fade-up" data-aos-delay="100">
            <div class="col-lg-7" style="width:100%;">
              <form action="" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label  class="form-label">Question</label>
                    <input type="text" class="form-control" name="question"  required value="{{qa.qa_q}}">
                </div>
                <div class="mb-3">
                    <label  class="form-label">Answer</label>
                    <input type="text" class="form-control" name="answer"  required value="{{qa.qa_a}}">
                </div>


                <div class="text-center">
                    <button type="submit" class="btn-submit">Update</button>
                </div>

            </form>
            </div>
        </div>
    </section>
</main>
