<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interview Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f6f9;
      color: #333;
    }

    .container {
      max-width: 500px;
      margin: 5rem auto;
      padding: 2.5rem;
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .container h2 {
      text-align: center;
      color: #002b5b;
      margin-bottom: 2rem;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #555;
    }

    input[type="email"],
    input[type="password"] {
      padding: 0.75rem 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #0066cc;
      outline: none;
    }

    .start-button {
      background-color: #0066cc;
      color: white;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .start-button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(0, 102, 204, 0.3);
    }

    .error-message {
      color: red;
      margin-bottom: 1rem;
      font-size: 0.95rem;
      display: none; /* Toggle this with JavaScript or server logic if needed */
    }
  </style>
</head>

{% if message %}
<script>alert("{{message}}")</script>
{% endif %}

<body>

    <h1 style="text-align: center; color: #002b5b; margin-top: 2rem; font-weight: 600;">
      Session 1 : Verification
    </h1>

    <div class="container">
        <h2>Intelliview Login</h2>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">
          Please log in using the <strong>email ID you used while applying</strong> and the <strong>password received in your email</strong>.
        </p>
      
        <form method="POST" action="{% url 'applicant_varification' %}">
          {% csrf_token %}
      
          <label for="email">Email ID</label>
          <input type="email" id="email" name="email" required>
      
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
      
          <button type="submit" class="start-button">Verify & Proceed</button>
        </form>
      </div>
</body>
</html>
