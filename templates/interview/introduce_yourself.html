{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Self Introduction</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: #f4f6f9;
      color: #333;
      height: 100%;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      color: #002b5b;
    }

    .video-wrapper {
      flex: 1;
      width: 100%;
      max-width: 960px;
      border: 2px solid #ccc;
      border-radius: 16px;
      overflow: hidden;
      background-color: white;
      margin: 2rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #video-stream {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(0, 102, 204, 0.3);
    }

    .timer {
      font-size: 1.25rem;
      font-weight: bold;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Session 2: Self Introduction </h1>
    <h3>Introduce Yourself: in 30 seconds</h3>

    <div class="video-wrapper">
      <img src="{% url 'video_feed' %}" id="video-stream" alt="Live Video Stream" />
    </div>

    <div class="controls" id="controls">
      <button id="start-btn" class="btn">Start Talking</button>
    </div>

    <div class="timer" id="timer" style="display: none;">Time Left: 30s</div>
  </div>

  <script>
    const startBtn = document.getElementById('start-btn');
    const controls = document.getElementById('controls');
    const timerDisplay = document.getElementById('timer');
    let countdown;

    startBtn.addEventListener('click', () => {
      let timeLeft = 30;

      // Hide start button and show timer
      controls.style.display = 'none';
      timerDisplay.style.display = 'block';
      timerDisplay.textContent = `Time Left: ${timeLeft}s`;

      countdown = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = `Time Left: ${timeLeft}s`;

        if (timeLeft <= 0) {
          clearInterval(countdown);

          // Redirect in the same tab after 30 seconds
          window.location.href = "{% url 'session3' %}";
        }
      }, 1000);
    });
  </script>
</body>
</html>
